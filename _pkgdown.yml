url: https://dynr.circadia-lab.uk

template:
  bootstrap: 5
  bslib:
    # ── Palette ───────────────────────────────────────────────────────────────
    # periwinkle #8D9FD7 | deep indigo #341C5D | dusty mauve #754D71
    # dusty rose #E19A8F | brick red   #9E3C30

    bg:        "#F4F3F3"   # keep the muted grey feel
    fg:        "#1C1C2E"   # dark navy text
    primary:   "#8D9FD7"   # periwinkle — links, active states
    secondary: "#754D71"   # dusty mauve — secondary elements
    success:   "#754D71"
    info:      "#8D9FD7"
    warning:   "#E19A8F"
    danger:    "#9E3C30"

    # ── Fonts ─────────────────────────────────────────────────────────────────
    base_font:    {google: "DM Sans"}
    heading_font: {google: "DM Sans"}
    code_font:    {google: "JetBrains Mono"}

    headings-font-weight: 700

    # ── Code blocks ───────────────────────────────────────────────────────────
    pre-bg:    "#E8ECF8"
    pre-color: "#341C5D"

  includes:
    in_header: |
      <style>
        /* ── Navbar ── */
        .navbar {
          background-color: #9E3C30 !important;
          border-bottom: 3px solid #E19A8F;
        }
        .navbar .navbar-brand,
        .navbar-nav .nav-link,
        .navbar-nav .nav-link:hover,
        .navbar form .btn {
          color: #F5D5CC !important;
        }
        .navbar-nav .nav-link:hover { opacity: 0.85; }
        .navbar-nav .nav-link.active {
          color: #F5D5CC !important;
          border-bottom: 2px solid #E19A8F;
        }
        .navbar small.nav-text { color: #F5D5CC !important; opacity: 0.75; }
        .navbar-brand img { height: 40px; width: auto; }

        /* ── Links ── */
        a { color: #8D9FD7; }
        a:hover { color: #341C5D; }

        /* ── Sidebar TOC ── */
        .sidebar .nav-link,
        .sidebar a,
        #toc a,
        #toc .nav-link {
          color: #1C1C2E !important;
        }
        .sidebar .nav-link:hover,
        .sidebar a:hover,
        #toc a:hover {
          color: #9E3C30 !important;
        }
        .sidebar .nav-link.active,
        #toc .nav-link.active {
          color: #9E3C30 !important;
          border-left: 2px solid #E19A8F;
          font-weight: 600;
        }
        .sidebar { border-left: 3px solid #E19A8F; padding-left: 1rem; }

        /* ── Inline code ── */
        code {
          color: #341C5D;
          background: #EAE6F2;
          border-radius: 4px;
          padding: 0.1em 0.35em;
        }

        /* ── Reference index section headers ── */
        .reference-index h2 {
          color: #9E3C30;
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }

        /* ── text-muted ── */
        .text-muted { color: #754D71 !important; }

        /* ── Footer ── */
        .footer { background: #9E3C30; color: #F5D5CC; padding: 1.5rem 0; }
        .footer a { color: #F5D5CC; opacity: 0.85; }
        .footer a:hover { opacity: 1; }

        /* ── Buttons ── */
        .btn-primary {
          background-color: #9E3C30 !important;
          border-color: #9E3C30 !important;
          color: #F5D5CC !important;
        }
        .btn-primary:hover {
          background-color: #341C5D !important;
          border-color: #341C5D !important;
        }

        /* ── Search ── */
        #search-input { border-color: #E19A8F; }
      </style>

logo: man/figures/logo.svg

home:
  title: "dynR — Dynamic Connectivity for Neurophysiological Timeseries"
  description: >
    An R port of the Python dynfc library for computing dynamic connectivity
    representations from multivariate neurophysiological timeseries, including
    BOLD fMRI, EEG, LFP, and related signals. Implements sliding-window
    correlations, edge-centric cofluctuations, instantaneous phase-locking,
    LEiDA, and the Kuramoto order parameter. Part of the Circadia Lab
    R ecosystem.
  strip_header: true
  links:
  - text: 🚧 This package is in active development — the API may change
    href: https://lifecycle.r-lib.org/articles/stages.html#experimental
  - text: Circadia Lab
    href: https://github.com/circadia-bio
  - text: Python dynfc
    href: https://github.com/LucasFranca/dynfc
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    articles:
      text: Vignettes
      menu:
        - text: Getting started
          href: articles/getting-started.html
        - text: Phase-based FC
          href: articles/phase-based-fc.html
        - text: Sliding-window FC
          href: articles/sliding-window-fc.html
    github:
      icon: fab fa-github
      href: https://github.com/circadia-bio/dynR
      aria-label: GitHub

articles:
  - title: "Vignettes"
    contents:
      - getting-started
      - phase-based-fc
      - sliding-window-fc

reference:
  - title: "Data"
    desc: "Example datasets bundled with dynR."
    contents:
      - ts
      - fc

  - title: "Signal preprocessing"
    desc: "Filter and prepare BOLD timeseries prior to dynFC analysis."
    contents:
      - bandpass_filter

  - title: "Phase-based methods"
    desc: "Instantaneous phase extraction, phase-locking, and Kuramoto order parameter."
    contents:
      - hilbert_phases
      - dyn_phase_lock
      - get_leida
      - kuramoto

  - title: "Correlation-based methods"
    desc: "Sliding-window FC and edge-centric cofluctuation."
    contents:
      - corr_slide
      - cofluct
      - corr_corr

  - title: "Utilities"
    desc: "Entropy and distance helpers."
    contents:
      - shannon_entropy
      - do_euclid

